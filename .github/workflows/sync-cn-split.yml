name: 每日同步 CN Split Tunnels 到 Cloudflare Zero Trust
permissions:
  contents: read

on:
  schedule:
    - cron: '0 3 * * 0'  # 每周日北京时间11:00（UTC 3:00）
  workflow_dispatch:         # 手动触发按钮

  # 🚀 添加此全局环境变量，强制要求所有 Actions 步骤使用 Node.js 24 内核运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 运行同步脚本
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROFILE_ID: ${{ secrets.CF_PROFILE_ID }}
          MODE: exclude                     # 可改成 include
        run: python cf-zt-cn-split.py
